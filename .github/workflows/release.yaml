name: Release babyrite

on:
  push:
    branches:
      - main

permissions:
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-24.04
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get token
        id: babyrite-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          # Skip token revocation because expired tokens are automatically
          # invalidated by GitHub anyway.
          skip-token-revoke: true

      - name: Run release-please-action
        uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.babyrite-token.outputs.token }}

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            cache-scope: buildx-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            cache-scope: buildx-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: ${{ matrix.platform }}
          file: ./docker/Dockerfile
          outputs: type=image,name=ghcr.io/m1sk9/babyrite,push-by-digest=true,name-canonical=true
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,scope=${{ matrix.cache-scope }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.cache-scope }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs:
      - release-please
      - build
    runs-on: ubuntu-24.04
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          MAJOR: ${{ needs.release-please.outputs.major }}
          MINOR: ${{ needs.release-please.outputs.minor }}
          PATCH: ${{ needs.release-please.outputs.patch }}
          SHA: ${{ needs.release-please.outputs.sha }}
        run: |
          tags=(
            "ghcr.io/m1sk9/babyrite:latest"
            "ghcr.io/m1sk9/babyrite:${SHA}"
            "ghcr.io/m1sk9/babyrite:v${MAJOR}"
            "ghcr.io/m1sk9/babyrite:v${MAJOR}.${MINOR}"
            "ghcr.io/m1sk9/babyrite:v${MAJOR}.${MINOR}.${PATCH}"
          )
          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=("-t" "$tag")
          done
          sources=()
          for digest in *; do
            sources+=("ghcr.io/m1sk9/babyrite@sha256:${digest}")
          done
          docker buildx imagetools create "${tag_args[@]}" "${sources[@]}"
