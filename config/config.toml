### babyrite configuration file ###
# This file is used for babyrite configuration.
# By changing this configuration, you can modify the behavior of babyrite. Please restart babyrite after changing the settings.
# The settings are written in TOML format. To use the configuration file, specify the recursive path to the configuration file in the environment variable "CONFIG_FILE_PATH" injected into the container.
# Note that babyrite will run with default settings if not configured.

# JSON logging format (default is disabled)
## Deprecated: use the [log] section below ("format = \"json\"") instead.
## Kept for backward compatibility; it is only used when [log] format is unset.
json_logging = false

# Logging configuration
[log]
## Log level filter. Accepts the same syntax as the RUST_LOG environment variable
## (e.g. "babyrite=debug"). The RUST_LOG environment variable, if set, takes
## precedence over this value. (default: "babyrite=info")
level = "babyrite=info"
## Output format: "compact" (human-readable) or "json".
## "json" is recommended when using Grafana Loki or similar log aggregation.
## (default: "compact")
format = "compact"

# Feature flags
[features]
## Enable GitHub Permalink expansion (default: true)
github_permalink = true

# GitHub configuration
[github]
## Maximum number of lines to display without truncation (default: 50)
max_lines = 50
